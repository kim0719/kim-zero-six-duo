<!DOCTYPE html>
<html>
<head>
<title>🕵️ Mystery Case</title>

<style>
body{
background:#222;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#333;
padding:25px;
border-radius:20px;
max-width:400px;
margin:auto;
}

input{
padding:10px;
border-radius:10px;
border:0;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:0;
border-radius:15px;
background:#d4af37;
cursor:pointer;
}

.page{
display:none;
}

.show{
display:block;
}
</style>

</head>

<body>

<div class="box">

<div id="start" class="page show">
<h1>🕵️ Case File #001</h1>
<p>The Hidden Surprise</p>

<button onclick="next('clue1')">🔍 Start Investigation</button>
</div>


<div id="clue1" class="page">
<h2>🗝️ Clue 1</h2>
<p>Where did we first meet?</p>

<input id="a1" placeholder="Answer">

<br>

<button onclick="check1()">Check</button>
<p id="m1"></p>
</div>


<div id="clue2" class="page">
<h2>📁 Clue 2</h2>
<p>What do we call each other?</p>

<input id="a2" placeholder="Answer">

<br>

<button onclick="check2()">Check</button>
<p id="m2"></p>
</div>


<div id="clue3" class="page">
<h2>🔐 Clue 3</h2>
<p>What is our favorite activity?</p>

<input id="a3" placeholder="Answer">

<br>

<button onclick="check3()">Check</button>
<p id="m3"></p>
</div>


<div id="reward" class="page">
<h1>🏆 Case Solved!</h1>

<p>You found the hidden surprise.</p>

<h2>💋 A Kiss</h2>
</div>


</div>


<script>

function next(page){
document.querySelectorAll(".page")
.forEach(x=>x.classList.remove("show"));

document.getElementById(page)
.classList.add("show");
}


function check1(){
let a=document.getElementById("a1").value.toLowerCase();

if(a=="ml"){
next("clue2");
}else{
m1.innerHTML="Try again 🔍";
}
}


function check2(){
let a=document.getElementById("a2").value.toLowerCase();

if(a=="langga"){
next("clue3");
}else{
m2.innerHTML="Try again 🔍";
}
}


function check3(){
let a=document.getElementById("a3").value.toLowerCase();

if(a=="online games"){
next("reward");
}else{
m3.innerHTML="Try again 🔍";
}
}

</script>

</body>
</html>
